<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechTree / Icon Mapper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
  h1 { text-align: center; margin-bottom: 6px; color: #ffd700; }
  .sub { text-align: center; color: #8a8aa0; font-size: 13px; margin-bottom: 16px; }
  .bar { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .tabs { display: flex; gap: 8px; margin: 14px 0; justify-content: center; flex-wrap: wrap; }
  .tab { padding: 10px 18px; background: #16213e; border: 2px solid #0f3460; border-radius: 8px; cursor: pointer; color: #fff; transition: .15s; font-size: 14px; }
  .tab:hover { background: #0f3460; }
  .tab.active { background: #e94560; border-color: #e94560; }
  .btn { padding: 9px 16px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; }
  .btn.secondary { background: #0f3460; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .status { font-size: 12px; color: #9a9ab0; min-height: 16px; text-align: center; margin-top: 6px; }
  .status.ok { color: #00ff88; } .status.err { color: #ff6b6b; }
  .pane { display: none; background: #16213e; border-radius: 12px; padding: 18px; }
  .pane.active { display: block; }
  .pane h2 { color: #ffd700; margin-bottom: 6px; font-size: 18px; }
  .pane .hint { color: #8a8aa0; font-size: 12px; margin-bottom: 14px; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .controls label { font-size: 12px; color: #bcbcd0; display: inline-flex; gap: 6px; align-items: center; }
  .controls input[type=number] { width: 70px; padding: 5px; background: #1a1a2e; border: 1px solid #0f3460; color: #fff; border-radius: 6px; }
  /* Sheet grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .cell { background: #0f3460; border: 2px solid #1a1a2e; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cell.assigned { border-color: #00ff88; }
  .cell .idx { font-size: 10px; color: #8a8aa0; }
  .sprite { width: 72px; height: 72px; image-rendering: pixelated; background-repeat: no-repeat; border-radius: 6px; background-color: #00000033; }
  .cell select, .cell input { width: 100%; padding: 5px; font-size: 11px; background: #1a1a2e; border: 1px solid #294a80; color: #fff; border-radius: 6px; }
  /* Tree */
  .tree-wrap { overflow-x: auto; }
  .canvas { position: relative; min-width: 900px; }
  .tnode { position: absolute; width: 84px; height: 104px; background: #0f3460; border: 3px solid #1a1a2e; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; padding-top: 4px; transition: .12s; }
  .tnode:hover { border-color: #e94560; }
  .tnode.mapped { border-color: #00ff88; }
  .tnode .tier { font-size: 9px; color: #ffd700; }
  .tnode .ticon { width: 44px; height: 44px; image-rendering: pixelated; background-repeat: no-repeat; }
  .tnode .tid { font-size: 9px; color: #8a8aa0; }
  .tnode .ttype { font-size: 8px; text-align: center; line-height: 1.1; padding: 0 2px; }
  svg.lines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  svg.lines line { stroke: #294a80; stroke-width: 2; }
  /* Picker overlay */
  .overlay { position: fixed; inset: 0; background: #000a; display: none; z-index: 40; }
  .overlay.active { display: block; }
  .picker { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 18px; z-index: 50; display: none; max-height: 80vh; overflow-y: auto; width: min(720px, 92vw); }
  .picker.active { display: block; }
  .picker h3 { color: #ffd700; margin-bottom: 12px; }
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px,1fr)); gap: 8px; }
  .popt { background: #0f3460; border: 2px solid transparent; border-radius: 8px; padding: 4px; cursor: pointer; position: relative; }
  .popt:hover { border-color: #e94560; }
  .popt.selected { border-color: #00ff88; }
  .popt .psprite { width: 56px; height: 56px; image-rendering: pixelated; background-repeat: no-repeat; margin: 0 auto; }
  .popt .pidx { font-size: 9px; color: #8a8aa0; text-align: center; }
</style>
</head>
<body>
  <h1>🌲 TechTree / Icon Mapper</h1>
  <div class="sub">Live-loads the real config JSONs and saves back to the originals.</div>

  <div class="bar">
    <button class="btn" id="pickDirBtn">📂 Connect repo folder (for saving)</button>
    <button class="btn secondary" id="reloadBtn">↻ Reload data</button>
    <span id="verLabel" style="font-size:12px;color:#8a8aa0;"></span>
  </div>
  <div class="status" id="globalStatus">Serve this file from localhost (e.g. <code>python3 -m http.server 8000</code>) then open http://localhost:8000/techtree_mapper.html</div>

  <div class="tabs" id="tabs"></div>
  <div id="panes"></div>

  <div class="overlay" id="overlay"></div>
  <div class="picker" id="picker">
    <h3 id="pickerTitle">Pick a sprite</h3>
    <div class="pgrid" id="pickerGrid"></div>
  </div>

<script>
"use strict";

// ---------- paths ----------
const CFG = 'public/parsed_configs/';
const tex = (file) => `public/Texture2D/${VERSION}/${file}`;
let VERSION = null;
let dirHandle = null;

// ---------- in-memory state ----------
const state = {
  techMapping: null,          // full TechTreeMapping.json (edited in place)
  playerAtlas: {},            // spriteIdx -> rect (from TechTreeMapping)
  clanMap: null,              // ClanTechTreeIconsMap.json (edited)
  clanTypes: [],              // [{name,category}] flattened from GuildTechTreePositionLibrary
  iconsMap: null,             // IconsMap.json (edited)
  skinsMap: null,             // SkinsIconsMap.json (edited, created if missing)
  skinIds: [],                // [{type,idx,label}] from SkinsLibrary
};

// ---------- helpers ----------
async function fetchJSON(path, optional=false) {
  const res = await fetch(path + '?_=' + Date.now(), {cache:'no-store'});
  if (!res.ok) { if (optional) return null; throw new Error(`fetch failed: ${path} (${res.status})`); }
  return res.json();
}
function setStatus(el, msg, cls='') { el.textContent = msg; el.className = 'status' + (cls?(' '+cls):''); }
function gstatus(msg, cls='') { setStatus(document.getElementById('globalStatus'), msg, cls); }

// background style for a sprite from a sheet; rects are top-left origin unless flipY
function spriteStyle(texUrl, texW, texH, rect, dispW, flipY) {
  const scale = dispW / rect.width;
  const x = rect.x * scale;
  const y = (flipY ? (texH - rect.y - rect.height) : rect.y) * scale;
  return `background-image:url('${texUrl}');background-size:${texW*scale}px ${texH*scale}px;background-position:${-x}px ${-y}px;`;
}
// build a row-major rect for grid sheets
function gridRect(idx, cols, size) {
  const c = idx % cols, r = Math.floor(idx / cols);
  return { x: c*size, y: r*size, width: size, height: size };
}

// ---------- File System Access (save) ----------
async function ensureDir() {
  if (dirHandle) return dirHandle;
  if (!window.showDirectoryPicker) throw new Error('This browser has no File System Access API. Use Chrome/Edge over http://localhost.');
  dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  return dirHandle;
}
async function writeJSON(relPath, obj) {
  const dir = await ensureDir();
  const parts = relPath.split('/');
  let h = dir;
  for (let i = 0; i < parts.length - 1; i++) h = await h.getDirectoryHandle(parts[i], { create: true });
  const fh = await h.getFileHandle(parts[parts.length - 1], { create: true });
  const w = await fh.createWritable();
  await w.write(JSON.stringify(obj, null, 2));
  await w.close();
}

// Download fallback — used when the File System Access API isn't available or the
// write is denied, so a save is never silently lost.
function downloadJSON(filename, obj) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// Try to write to disk; on any failure, download the file instead and report it.
async function persist(relPath, obj, st) {
  setStatus(st, 'Saving…');
  try {
    await writeJSON(relPath, obj);
    setStatus(st, 'Saved to disk ✓', 'ok');
  } catch (e) {
    downloadJSON(relPath.split('/').pop(), obj);
    setStatus(st, `Disk write failed (${e.message}) — downloaded instead. Move it into ${relPath}`, 'err');
  }
}

// ---------- load everything ----------
async function loadAll() {
  gstatus('Loading configs…');
  const versions = await fetchJSON(CFG + 'versions.json');
  VERSION = versions[versions.length - 1];
  document.getElementById('verLabel').textContent = 'version: ' + VERSION;

  // Player mapping + atlas
  state.techMapping = await fetchJSON(CFG + 'TechTreeMapping.json');
  state.playerAtlas = {};
  for (const tree of Object.values(state.techMapping.trees)) {
    for (const n of tree.nodes) {
      if (n.sprite_index != null && n.sprite_rect) state.playerAtlas[n.sprite_index] = n.sprite_rect;
    }
  }

  // Clan
  state.clanMap = await fetchJSON(CFG + 'ClanTechTreeIconsMap.json');
  const guildPos = await fetchJSON(CFG + VERSION + '/GuildTechTreePositionLibrary.json');
  const seen = new Set();
  state.clanTypes = [];
  for (const cat of Object.keys(guildPos)) {
    for (const t of (guildPos[cat]?.Nodes || [])) {
      if (!seen.has(t)) { seen.add(t); state.clanTypes.push({ name: t, category: guildPos[cat].Category || cat }); }
    }
  }

  // Icons
  state.iconsMap = await fetchJSON(CFG + 'IconsMap.json');

  // Skins library -> ids
  const skinsLib = await fetchJSON(CFG + VERSION + '/SkinsLibrary.json');
  state.skinIds = Object.keys(skinsLib).map(k => {
    const m = k.match(/'Type':\s*'([^']+)'.*?'Idx':\s*(\d+)/);
    const type = m ? m[1] : k, idx = m ? Number(m[2]) : 0;
    return { type, idx, label: `${type} #${idx}` };
  }).sort((a,b) => a.type.localeCompare(b.type) || a.idx - b.idx);

  // Skins map (may not exist yet)
  state.skinsMap = await fetchJSON(CFG + 'SkinsIconsMap.json', true) || {
    ui:       { texture: 'SkinsUiIcons.png',       texture_size:{width:2048,height:2048}, sprite_size:{width:256,height:256}, grid:{columns:8,rows:8}, total_sprites:64, mapping:{} },
    gameplay: { texture: 'SkinsGameplayIcons.png', texture_size:{width:2048,height:2048}, sprite_size:{width:256,height:256}, grid:{columns:8,rows:8}, total_sprites:64, mapping:{} },
  };

  gstatus('Loaded ✓  (' + VERSION + ')', 'ok');
  renderActive();
}

// ================= TABS =================
const TABS = [
  { id: 'Forge', label: '⚒️ Forge', kind: 'tree' },
  { id: 'Power', label: '⚡ Power', kind: 'tree' },
  { id: 'SkillsPetTech', label: '🐾 Skills & Pet', kind: 'tree' },
  { id: 'Clan', label: '🛡️ Clan', kind: 'clan' },
  { id: 'Icons', label: '📦 Icons', kind: 'icons' },
  { id: 'SkinsUi', label: '👕 Skins (UI)', kind: 'skins', section: 'ui' },
  { id: 'SkinsGameplay', label: '🎮 Skins (Game)', kind: 'skins', section: 'gameplay' },
];
let activeTab = 'Clan';

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const panesEl = document.getElementById('panes');
  tabsEl.innerHTML = ''; panesEl.innerHTML = '';
  for (const t of TABS) {
    const b = document.createElement('div');
    b.className = 'tab' + (t.id === activeTab ? ' active' : '');
    b.textContent = t.label;
    b.onclick = () => { activeTab = t.id; document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active', TABS[i].id===activeTab)); renderActive(); };
    tabsEl.appendChild(b);

    const p = document.createElement('div');
    p.className = 'pane' + (t.id === activeTab ? ' active' : '');
    p.id = 'pane-' + t.id;
    panesEl.appendChild(p);
  }
}
function renderActive() {
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + activeTab));
  const t = TABS.find(x => x.id === activeTab);
  if (!t || !state.techMapping) return;
  const pane = document.getElementById('pane-' + t.id);
  if (t.kind === 'tree') renderTreePane(pane, t.id);
  else if (t.kind === 'clan') renderClanPane(pane);
  else if (t.kind === 'icons') renderIconsPane(pane);
  else if (t.kind === 'skins') renderSkinsPane(pane, t.section);
}

// ================= TREE PANES (player) =================
let pickerCtx = null;
function renderTreePane(pane, treeName) {
  const tm = state.techMapping;
  const tree = tm.trees[treeName];
  const texUrl = tex(tm.texture);
  const texW = tm.texture_size.width, texH = tm.texture_size.height;

  pane.innerHTML = `
    <h2>${treeName}</h2>
    <div class="hint">Click a node to assign one of the known sprites from ${tm.texture}. Saves to TechTreeMapping.json.</div>
    <div class="controls">
      <label><input type="checkbox" id="flip-${treeName}" checked> Flip Y (Unity sheet)</label>
      <button class="btn" id="save-${treeName}">💾 Save TechTreeMapping.json</button>
      <span class="status" id="st-${treeName}"></span>
    </div>
    <div class="tree-wrap"><div class="canvas" id="canvas-${treeName}"></div></div>`;

  const flip = () => document.getElementById('flip-'+treeName).checked;
  const canvas = pane.querySelector('#canvas-' + treeName);

  const layers = {}; let maxLayer = 0;
  tree.nodes.forEach(n => { (layers[n.layer] ??= []).push(n); maxLayer = Math.max(maxLayer, n.layer); });
  const pos = {}; const xS = 100, yS = 120;
  for (let l = 0; l <= maxLayer; l++) {
    const arr = layers[l] || []; const startX = (arr.length - 1) * xS / 2;
    arr.forEach((n, i) => pos[n.id] = { x: 420 + i * xS - startX, y: 40 + l * yS });
  }
  canvas.style.minHeight = ((maxLayer + 1) * yS + 80) + 'px';

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg'); svg.setAttribute('class', 'lines');
  tree.nodes.forEach(n => (n.requirements || []).forEach(r => {
    if (pos[n.id] && pos[r] != null) {
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', pos[r].x + 42); line.setAttribute('y1', pos[r].y + 104);
      line.setAttribute('x2', pos[n.id].x + 42); line.setAttribute('y2', pos[n.id].y);
      svg.appendChild(line);
    }
  }));
  canvas.appendChild(svg);

  const drawIcon = (el, n) => {
    el.style.cssText = (n.sprite_rect) ? spriteStyle(texUrl, texW, texH, n.sprite_rect, 44, flip()) : '';
  };

  tree.nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'tnode' + (n.sprite_index != null ? ' mapped' : '');
    el.style.left = pos[n.id].x + 'px'; el.style.top = pos[n.id].y + 'px';
    el.innerHTML = `<div class="tier">T${n.tier}</div><div class="ticon"></div><div class="tid">#${n.id}</div><div class="ttype">${n.type.replace(/([A-Z])/g,' $1').trim()}</div>`;
    drawIcon(el.querySelector('.ticon'), n);
    el.onclick = () => openSpritePicker(treeName, n, () => renderActive());
    canvas.appendChild(el);
  });

  pane.querySelector('#flip-' + treeName).onchange = () => renderActive();
  pane.querySelector('#save-' + treeName).onclick = async () => {
    const st = pane.querySelector('#st-' + treeName);
    await persist(CFG + 'TechTreeMapping.json', state.techMapping, st);
  };
}

function openSpritePicker(treeName, node, done) {
  pickerCtx = { treeName, node, done };
  const tm = state.techMapping;
  const texUrl = tex(tm.texture), texW = tm.texture_size.width, texH = tm.texture_size.height;
  const flip = document.getElementById('flip-' + treeName)?.checked;
  document.getElementById('pickerTitle').textContent = `${treeName} • ${node.type} (#${node.id})`;
  const grid = document.getElementById('pickerGrid'); grid.innerHTML = '';
  Object.keys(state.playerAtlas).map(Number).sort((a,b)=>a-b).forEach(idx => {
    const rect = state.playerAtlas[idx];
    const o = document.createElement('div');
    o.className = 'popt' + (node.sprite_index === idx ? ' selected' : '');
    o.innerHTML = `<div class="psprite" style="${spriteStyle(texUrl,texW,texH,rect,56,flip)}"></div><div class="pidx">${idx}</div>`;
    o.onclick = () => {
      node.sprite_index = idx; node.sprite_file = `${tm.texture.replace('.png','')}_${idx}`; node.sprite_rect = rect;
      closePicker(); done && done();
    };
    grid.appendChild(o);
  });
  document.getElementById('overlay').classList.add('active');
  document.getElementById('picker').classList.add('active');
}
function closePicker() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('picker').classList.remove('active');
  pickerCtx = null;
}
document.getElementById('overlay').onclick = closePicker;

// ================= CLAN PANE (node-centric, dual-sheet) =================
// The clan sheet does NOT contain a distinct icon for every node: the game reuses
// icons from the player TechTreeIcons sheet for shared node types. So each clan NODE
// picks its icon from EITHER sheet. Entries are keyed by node type and store the
// texture + sprite_rect so the app can render from whichever sheet.
let clanPickerType = null;

function clanTexInfo() {
  const m = state.clanMap;
  return {
    clan: { url: tex(m.texture || 'ClanTechTreeIcons.png'), w: m.texture_size.width, h: m.texture_size.height, size: m.sprite_size.width, cols: m.grid.columns, total: m.total_sprites },
    player: { url: tex(state.techMapping.texture), w: state.techMapping.texture_size.width, h: state.techMapping.texture_size.height },
  };
}

function renderClanPane(pane) {
  const map = state.clanMap;
  const ti = clanTexInfo();

  pane.innerHTML = `
    <h2>Clan Tech Tree Icons</h2>
    <div class="hint">Click a node, then pick its icon from the clan sheet OR the player sheet (shared icons are reused). "auto" = falls back to the matching player icon. Saves to ClanTechTreeIconsMap.json.</div>
    <div class="controls">
      <button class="btn" id="clanSave">💾 Save ClanTechTreeIconsMap.json</button>
      <span class="status" id="clanSt"></span>
    </div>
    <div class="grid" id="clanGrid"></div>`;

  // Resolve like the app: find the entry whose .name matches (supports both the new
  // node-keyed rect entries and legacy sprite-index-keyed entries), else auto-reuse.
  const findEntry = (type) => Object.entries(map.mapping).find(([, e]) => e && e.name === type);
  const iconStyleForType = (type) => {
    const hit = findEntry(type);
    if (hit) {
      const [key, entry] = hit;
      if (entry.sprite_rect && entry.texture) {
        const ts = entry.texture_size || { width: 1024, height: 1024 };
        return spriteStyle(tex(entry.texture), ts.width, ts.height, entry.sprite_rect, 72, false);
      }
      const idx = parseInt(key);
      if (!Number.isNaN(idx)) {
        const rect = gridRect(idx, ti.clan.cols, ti.clan.size);
        return spriteStyle(ti.clan.url, ti.clan.w, ti.clan.h, rect, 72, false);
      }
    }
    for (const tr of Object.values(state.techMapping.trees)) {
      const n = (tr.nodes || []).find(x => x.type === type && x.sprite_rect);
      if (n) return spriteStyle(ti.player.url, ti.player.w, ti.player.h, n.sprite_rect, 72, false);
    }
    return '';
  };

  const grid = pane.querySelector('#clanGrid');
  state.clanTypes.forEach(t => {
    const assigned = !!findEntry(t.name);
    const cell = document.createElement('div');
    cell.className = 'cell' + (assigned ? ' assigned' : '');
    cell.innerHTML = `
      <div class="sprite" style="${iconStyleForType(t.name)}"></div>
      <div class="idx">${t.name}</div>
      <div style="font-size:9px;color:#8a8aa0">${t.category}${assigned ? '' : ' · auto'}</div>`;
    cell.onclick = () => openClanPicker(t.name);
    grid.appendChild(cell);
  });

  pane.querySelector('#clanSave').onclick = async () => {
    const st = pane.querySelector('#clanSt');
    await persist(CFG + 'ClanTechTreeIconsMap.json', map, st);
  };
}

function openClanPicker(type) {
  clanPickerType = type;
  const t = state.clanTypes.find(x => x.name === type);
  const ti = clanTexInfo();
  document.getElementById('pickerTitle').textContent = `Clan • ${type} (${t ? t.category : ''})`;
  const grid = document.getElementById('pickerGrid'); grid.innerHTML = '';

  const addOpt = (label, styleStr, onPick) => {
    const o = document.createElement('div');
    o.className = 'popt';
    o.innerHTML = `<div class="psprite" style="${styleStr}"></div><div class="pidx">${label}</div>`;
    o.onclick = () => { onPick(); closePicker(); renderActive(); };
    grid.appendChild(o);
  };
  const sep = (txt) => { const d = document.createElement('div'); d.style.cssText = 'grid-column:1/-1;color:#ffd700;font-size:11px;margin-top:6px'; d.textContent = txt; grid.appendChild(d); };
  // remove any existing entry (node-keyed or legacy index-keyed) for this node type
  const clearEntry = () => { for (const k of Object.keys(state.clanMap.mapping)) { if (state.clanMap.mapping[k]?.name === type) delete state.clanMap.mapping[k]; } };
  const assign = (rect, textureName, textureSize) => { clearEntry(); state.clanMap.mapping[type] = { name: type, category: t ? t.category : '', texture: textureName, texture_size: textureSize, sprite_rect: rect }; };

  addOpt('✕ auto', '', () => { clearEntry(); });

  // Render the FULL physical grid of a sheet (every 128px cell), so borrowed icons
  // that no node currently uses are still selectable.
  const renderSheet = (label, url, texW, texH, spriteSize, textureName, textureSize) => {
    sep(label);
    const cols = Math.max(1, Math.round(texW / spriteSize));
    const rows = Math.max(1, Math.round(texH / spriteSize));
    for (let i = 0; i < cols * rows; i++) {
      const rect = gridRect(i, cols, spriteSize);
      addOpt('#' + i, spriteStyle(url, texW, texH, rect, 56, false), () => assign(rect, textureName, textureSize));
    }
  };

  const playerSprite = (Object.values(state.playerAtlas)[0]?.width) || 128;
  renderSheet('Clan sheet (ClanTechTreeIcons)', ti.clan.url, ti.clan.w, ti.clan.h, ti.clan.size, state.clanMap.texture || 'ClanTechTreeIcons.png', { width: ti.clan.w, height: ti.clan.h });
  renderSheet('Player sheet (TechTreeIcons)', ti.player.url, ti.player.w, ti.player.h, playerSprite, state.techMapping.texture, state.techMapping.texture_size);

  document.getElementById('overlay').classList.add('active');
  document.getElementById('picker').classList.add('active');
}

// ================= ICONS PANE =================
function renderIconsPane(pane) {
  const map = state.iconsMap;
  const texUrl = tex(map.texture || 'Icons.png');
  const texW = map.texture_size.width, texH = map.texture_size.height;
  const size = map.sprite_size.width, cols = map.grid.columns, total = map.total_sprites;

  pane.innerHTML = `
    <h2>Generic Icons</h2>
    <div class="hint">Each sprite of ${map.texture} → free name. Saves to IconsMap.json.</div>
    <div class="controls">
      <label><input type="checkbox" id="iconFlip"> Flip Y</label>
      <button class="btn" id="iconSave">💾 Save IconsMap.json</button>
      <span class="status" id="iconSt"></span>
    </div>
    <div class="grid" id="iconGrid"></div>`;

  const render = () => {
    const flip = pane.querySelector('#iconFlip').checked;
    const grid = pane.querySelector('#iconGrid'); grid.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const cur = map.mapping[i] || {};
      const rect = cur.sprite_rect || gridRect(i, cols, size);
      const cell = document.createElement('div');
      cell.className = 'cell' + (cur.name ? ' assigned' : '');
      cell.innerHTML = `<div class="sprite" style="${spriteStyle(texUrl,texW,texH,rect,72,flip)}"></div><div class="idx">#${i}</div><input data-i="${i}" placeholder="name…" value="${cur.name||''}">`;
      const inp = cell.querySelector('input');
      inp.oninput = () => {
        map.mapping[i] = { name: inp.value || null, sprite_rect: rect };
        cell.classList.toggle('assigned', !!inp.value);
      };
      grid.appendChild(cell);
    }
  };
  pane.querySelector('#iconFlip').onchange = render;
  pane.querySelector('#iconSave').onclick = async () => {
    const st = pane.querySelector('#iconSt');
    await persist(CFG + 'IconsMap.json', map, st);
  };
  render();
}

// ================= SKINS PANES =================
function renderSkinsPane(pane, section) {
  const sm = state.skinsMap[section];
  const texUrl = tex(sm.texture);
  const texW = sm.texture_size.width, texH = sm.texture_size.height;

  const options = ['<option value="">— unassigned —</option>']
    .concat(state.skinIds.map(s => `<option value="${s.type}:${s.idx}">${s.label}</option>`)).join('');

  pane.innerHTML = `
    <h2>Skins — ${section === 'ui' ? 'UI icons' : 'Gameplay icons'}</h2>
    <div class="hint">Each sprite of ${sm.texture} → skin (Type + Idx from SkinsLibrary). Saves to SkinsIconsMap.json.</div>
    <div class="controls">
      <label>Sprite size <input type="number" id="skSize" value="${sm.sprite_size.width}"></label>
      <label>Columns <input type="number" id="skCols" value="${sm.grid.columns}"></label>
      <label>Count <input type="number" id="skTotal" value="${sm.total_sprites}"></label>
      <label><input type="checkbox" id="skFlip"> Flip Y</label>
      <button class="btn" id="skSave">💾 Save SkinsIconsMap.json</button>
      <span class="status" id="skSt"></span>
    </div>
    <div class="grid" id="skGrid"></div>`;

  const render = () => {
    const size = Number(pane.querySelector('#skSize').value) || 256;
    const cols = Number(pane.querySelector('#skCols').value) || 8;
    const total = Number(pane.querySelector('#skTotal').value) || 64;
    const flip = pane.querySelector('#skFlip').checked;
    sm.sprite_size = { width: size, height: size };
    sm.grid = { columns: cols, rows: Math.ceil(total / cols) };
    sm.total_sprites = total;
    const grid = pane.querySelector('#skGrid'); grid.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const cur = sm.mapping[i];
      const rect = gridRect(i, cols, size);
      const cell = document.createElement('div');
      cell.className = 'cell' + (cur ? ' assigned' : '');
      cell.innerHTML = `<div class="sprite" style="${spriteStyle(texUrl,texW,texH,rect,72,flip)}"></div><div class="idx">#${i}</div><select data-i="${i}">${options}</select>`;
      const sel = cell.querySelector('select');
      sel.value = cur ? `${cur.type}:${cur.idx}` : '';
      sel.onchange = () => {
        if (!sel.value) delete sm.mapping[i];
        else { const [type, idx] = sel.value.split(':'); sm.mapping[i] = { type, idx: Number(idx) }; }
        cell.classList.toggle('assigned', !!sel.value);
      };
      grid.appendChild(cell);
    }
  };
  ['skSize','skCols','skTotal','skFlip'].forEach(id => pane.querySelector('#'+id).onchange = render);
  pane.querySelector('#skSave').onclick = async () => {
    const st = pane.querySelector('#skSt');
    await persist(CFG + 'SkinsIconsMap.json', state.skinsMap, st);
  };
  render();
}

// ---------- boot ----------
document.getElementById('pickDirBtn').onclick = async () => {
  try { await ensureDir(); gstatus('Repo folder connected ✓ — saving enabled', 'ok'); }
  catch (e) { gstatus(e.message, 'err'); }
};
document.getElementById('reloadBtn').onclick = () => loadAll().catch(e => gstatus(e.message, 'err'));

buildTabs();
loadAll().catch(e => gstatus('Load error: ' + e.message + ' — is it served from localhost?', 'err'));
</script>
